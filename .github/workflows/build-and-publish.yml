name: Build and Publish NuGet Package

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  NUGET_SOURCE: 'https://api.nuget.org/v3/index.json'

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          source-url: ${{ env.NUGET_SOURCE }}

      - name: Install MAUI Workloads
        run: |
          dotnet workload install maui
          dotnet workload install android
          dotnet workload install ios
          dotnet workload install maccatalyst

      - name: Restore dependencies
        run: dotnet restore src/MauiSensorKit/MauiSensorKit.csproj

      - name: Build
        run: dotnet build src/MauiSensorKit/MauiSensorKit.csproj --configuration Release --no-restore

      - name: Test (if tests exist)
        run: |
          if [ -d "tests" ]; then
            dotnet test --configuration Release --no-build
          fi
        continue-on-error: true

      - name: Pack
        run: dotnet pack src/MauiSensorKit/MauiSensorKit.csproj --configuration Release --no-build --output ./artifacts

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
          retention-days: 30

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish to NuGet.org
        run: |
          for package in ./artifacts/*.nupkg; do
            dotnet nuget push "$package" --api-key "${{ secrets.NUGET_API_KEY }}" --source "${{ env.NUGET_SOURCE }}" --skip-duplicate
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: ./artifacts/*.nupkg
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
